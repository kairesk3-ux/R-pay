<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #0a0f1d; color: white; padding: 20px; font-family: sans-serif; }
        
        /* Header section for title and refresh button */
        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        /* Small button for refresh */
        .refresh-btn { background: #555; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-size: 14px; }
        
        .order-card { background: #16213e; padding: 15px; border-radius: 15px; border: 1px solid #00f2ff; margin-bottom: 15px; }
        
        /* Smaller, compact Buy button */
        .buy-btn { background: #00f2ff; border: none; padding: 8px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; color: #0a0f1d; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>

    <div class="header-container">
        <h2>Deposit Orders</h2>
        <button class="refresh-btn" onclick="location.reload()">🔄 Refresh</button>
    </div>

    <div class="order-card">
        <p>ORDER: ₹200.00 | Income: ₹8 (4%)</p>
        <a href="/confirm_order/200" class="buy-btn">Buy Order</a>
    </div>

    <div class="order-card">
        <p>ORDER: ₹8000.00 | Income: ₹320 (4%)</p>
        <a href="/confirm_order/8000" class="buy-btn">Buy Order</a>
    </div>

</body>
</html>
