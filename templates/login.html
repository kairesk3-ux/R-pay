<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #0a0f1d; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: #16213e; padding: 30px; border-radius: 20px; border: 1px solid #00f2ff; width: 85%; max-width: 400px; text-align: center; }
        h2 { color: #00f2ff; margin-bottom: 30px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #00f2ff; background: #0a0f1d; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 20px; border-radius: 10px; border: none; background: #00f2ff; color: #0a0f1d; font-weight: bold; cursor: pointer; }
        a { color: #00f2ff; text-decoration: none; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="login-card">
    <h2>LOG IN</h2>
    <form action="/login" method="POST">
        <input type="text" name="phone" placeholder="Enter Your Phone Number" required>
        <input type="password" name="password" placeholder="Enter Password" required>
        <button type="submit">LOG IN</button>
    </form>
    <p style="margin-top: 15px;"><a href="#">Forget Password</a></p>
</div>

</body>
</html>
