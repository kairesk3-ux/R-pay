<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>R pay Dashboard</title>
  <style>
    :root { font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #eef2ff; color: #111827; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #eef2ff; }
    .page { padding-bottom: 100px; }
    .topbar { display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem; padding: 1.4rem 1.25rem 0.5rem; }
    .brand-label { color: #334155; font-size: 0.95rem; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.35rem; display: block; }
    .brand-title { margin: 0; font-size: 1.8rem; font-weight: 800; letter-spacing: -0.03em; }
    .logout { color: #475569; text-decoration: none; font-weight: 700; font-size: 0.94rem; }
    .hero { margin: 0 1.25rem; background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); border-radius: 28px; padding: 1.5rem; color: #ffffff; box-shadow: 0 24px 55px rgba(15, 23, 42, 0.12); overflow: hidden; }
    .stats-row { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0.9rem; margin: 1.25rem; }
    .badge { background: #ffffff; border-radius: 24px; padding: 1rem; box-shadow: 0 18px 36px rgba(15, 23, 42, 0.08); border: 1px solid rgba(148, 163, 184, 0.15); }
    .label { color: #475569; font-size: 0.9rem; margin-bottom: 0.5rem; display: block; }
    .value { margin: 0; font-size: 1rem; font-weight: 700; color: #0f172a; }
    .action-panel { margin: 0 1.25rem 1rem; }
    .topup-btn { width: 100%; background: #111827; border: none; border-radius: 22px; color: #ffffff; font-size: 1rem; font-weight: 700; padding: 1.05rem; cursor: pointer; box-shadow: 0 18px 30px rgba(17, 24, 39, 0.18); }
    .grid-cards { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0.9rem; margin: 0 1.25rem 1rem; }
    .info-card { background: #ffffff; border-radius: 24px; padding: 1.15rem; box-shadow: 0 18px 36px rgba(15, 23, 42, 0.08); border: 1px solid rgba(148, 163, 184, 0.14); }
    .info-card .name { margin: 0; color: #475569; font-size: 0.9rem; }
    .info-card .amount { margin: 0.9rem 0 0; font-size: 1.75rem; font-weight: 800; color: #111827; }
    .accounts-card { margin: 0 1.25rem 1rem; border-radius: 28px; background: #ffffff; padding: 1.25rem; box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08); border: 1px solid rgba(148, 163, 184, 0.18); }
    .bottom-nav { position: fixed; right: 0; bottom: 0; left: 0; padding: 0.9rem 1rem 1.1rem; display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 0.5rem; background: rgba(255, 255, 255, 0.96); border-top: 1px solid rgba(148, 163, 184, 0.18); backdrop-filter: blur(16px); }
    .nav-item { display: grid; gap: 0.4rem; place-items: center; font-size: 0.78rem; color: #475569; text-decoration: none; }
    .nav-icon { width: 42px; height: 42px; border-radius: 14px; display: grid; place-items: center; background: #f8fafc; }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div><span class="brand-label">R pay</span><h1 class="brand-title">Welcome back</h1></div>
      <a href="{{ url_for('logout') }}" class="logout">Logout</a>
    </header>

    <section class="hero">
      <h2>Rewards Spin Wheel</h2>
      <p>Enjoy daily rewards and exclusive growth offers.</p>
    </section>

    <section class="stats-row">
      <div class="badge"><span class="label">USDT Ratio</span><p class="value">1 USDT ≈ 106.08 INR</p></div>
      <div class="badge"><span class="label">INR Bonus Ratio</span><p class="value">4%</p></div>
    </section>

    <section class="action-panel"><button class="topup-btn">Top up</button></section>

    <section class="accounts-card">
      <h2 class="brand-title" style="font-size:1.1rem; margin-bottom:1rem;">Linked Bank Accounts</h2>
      <p class="label">No bank accounts linked yet.</p>
    </section>

    <section class="grid-cards">
      <article class="info-card"><p class="name">Balance</p><p class="amount">0.00</p></article>
      <article class="info-card"><p class="name">Today Received</p><p class="amount">0.00</p></article>
    </section>
  </div>

  <nav class="bottom-nav">
    <a href="{{ url_for('dashboard') }}" class="nav-item"><span class="nav-icon">&#127968;</span>Home</a>
    <a href="{{ url_for('deposit') }}" class="nav-item"><span class="nav-icon">&#128179;</span>Deposit</a>
    <a href="{{ url_for('bank_account') }}" class="nav-item"><span class="nav-icon">&#128221;</span>Bank</a>
    <a href="{{ url_for('profile') }}" class="nav-item"><span class="nav-icon">&#128587;</span>Profile</a>
  </nav>
</body>
</html>
