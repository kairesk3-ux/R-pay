<!DOCTYPE html>
<html>
<head>

        /* Bottom Navbar */
        .nav-bottom { position: fixed; bottom: 0; left: 0; width: 100%; display: flex; justify-content: space-around; background: #16213e; padding: 10px 0; border-top: 1px solid #00f2ff; }
        .nav-item { text-align: center; color: white; text-decoration: none; font-size: 0.8em; }
