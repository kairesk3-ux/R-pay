<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #0a0f1d; color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .reg-container { background: #16213e; padding: 30px; border-radius: 20px; border: 1px solid #00f2ff; width: 85%; max-width: 400px; text-align: center; }
        h2 { color: #00f2ff; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #00f2ff; background: #0a0f1d; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 20px; border-radius: 10px; border: none; background: #00f2ff; color: #0a0f1d; font-weight: bold; cursor: pointer; }
        a { color: #00f2ff; text-decoration: none; }
    </style>
</head>
<body>

<div class="reg-container">
    <h2>Register</h2>
    <form action="/register" method="POST">
        <input type="text" name="phone" placeholder="Phone" required>
        <input type="password" name="password" placeholder="Enter Password" required>
        <input type="password" name="confirm_password" placeholder="Repeat Password" required>
        <input type="text" name="invite_code" placeholder="Invitation Code">
        <button type="submit">Register</button>
    </form>
    <p>Already have an account? <a href="/login">Login</a></p>
</div>

</body>
</html>
