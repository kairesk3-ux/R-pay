<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Profile</title>
    <style>
        body { font-family: sans-serif; background: #f9f9f9; padding: 20px; max-width: 500px; margin: auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        .save-btn { background: #111; color: white; padding: 12px; width: 100%; border: none; border-radius: 8px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <a href="/profile">← Back</a>
    <h2>Edit Profile</h2>

    <form action="/edit_profile" method="POST">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" name="name" placeholder="Enter your name">
        </div>
        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="email" placeholder="example@mail.com">
        </div>
        <div class="form-group">
            <label>Profile Picture</label>
            <input type="file" name="profile_pic">
        </div>
        <button type="submit" class="save-btn">Save Changes</button>
    </form>
</body>
</html>
