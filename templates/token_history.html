<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #0a0f1d; color: white; font-family: sans-serif; padding: 20px; }
        .tabs { display: flex; justify-content: space-between; margin-bottom: 20px; background: #16213e; padding: 5px; border-radius: 10px; }
        .tab-btn { padding: 8px 12px; cursor: pointer; border-radius: 8px; border: none; background: transparent; color: white; transition: 0.3s; }
        .tab-btn.active { background: #00f2ff; color: #0a0f1d; font-weight: bold; }
        .record { background: #1a2a4a; padding: 15px; margin-bottom: 10px; border-radius: 10px; border-left: 4px solid #00f2ff; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h2>Token History</h2>
    <div class="tabs">
        <button class="tab-btn active" onclick="filterRecords('all', this)">All</button>
        <button class="tab-btn" onclick="filterRecords('receive', this)">Receive</button>
        <button class="tab-btn" onclick="filterRecords('commission', this)">Commission</button>
        <button class="tab-btn" onclick="filterRecords('recharge', this)">Recharge</button>
    </div>

    <div id="history-list">
        <div class="record" data-type="recharge">Recharge: ₹200 | Status: Success</div>
        <div class="record" data-type="receive">Receive: ₹500 | Status: Success</div>
        <div class="record" data-type="commission">Commission: +₹8 | Status: Success</div>
        <div class="record" data-type="recharge">Recharge: ₹1000 | Status: Success</div>
    </div>

    <script>
        function filterRecords(type, btn) {
            // Button active state logic
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Filtering logic
            const records = document.querySelectorAll('.record');
            records.forEach(rec => {
                if (type === 'all' || rec.getAttribute('data-type') === type) {
                    rec.classList.remove('hidden');
                } else {
                    rec.classList.add('hidden');
                }
            });
        }
    </script>
</body>
</html>
