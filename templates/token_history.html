<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Token History</title>
    <style>
        body { font-family: sans-serif; background: #f9f9f9; padding: 20px; max-width: 500px; margin: auto; }
        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #eee; display: flex; justify-content: space-between; }
        .status-win { color: green; font-weight: bold; }
        .status-lose { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <a href="/profile" style="margin-right: 15px; text-decoration: none;">← Back</a>
        <h2>Token History</h2>
    </div>

    <div class="card">
        <div><strong>Token #1021</strong><br><small>May 28, 2026</small></div>
        <div class="status-win">+ ₹500</div>
    </div>
    <div class="card">
        <div><strong>Token #1020</strong><br><small>May 27, 2026</small></div>
        <div class="status-lose">- ₹200</div>
    </div>
</body>
</html>
