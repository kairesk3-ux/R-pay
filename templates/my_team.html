<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #0a0f1d; color: white; font-family: sans-serif; padding: 20px; }
        
        /* Stats Grid Layout - Screenshot jaisa */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: #16213e; padding: 15px; border-radius: 10px; border: 1px solid #00f2ff; }
        .stat-box { padding: 10px; text-align: center; border: 1px solid #2c3e50; border-radius: 5px; }
        .stat-box strong { font-size: 18px; color: #00f2ff; }
        
        .referral-box { background: #1a2a4a; padding: 15px; border-radius: 10px; margin-top: 20px; }
        .copy-btn { background: #00f2ff; color: #0a0f1d; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #2c3e50; }
    </style>
</head>
<body>

    <div class="stats-grid">
        <div class="stat-box"><strong>{{ team_count }}</strong><br>Team Count</div>
        <div class="stat-box"><strong>₹{{ team_value }}</strong><br>Total Deposit</div>
        <div class="stat-box"><strong>₹{{ today_earning }}</strong><br>Today Earning</div>
        <div class="stat-box"><strong>0</strong><br>New Members</div>
    </div>

    <div class="referral-box">
        <p>Your Referral Link:</p>
        <input type="text" id="refLink" value="https://rpay.com/register?ref={{ user.referral_code }}" readonly style="padding: 10px; border-radius: 5px; border: none; width: 100%; box-sizing: border-box;">
        <button class="copy-btn" onclick="copyRef()">Copy Link</button>
    </div>

    <h3>Team Members</h3>
    {% if team %}
        <table>
            <tr><th>User ID</th><th>Earnings</th></tr>
            {% for member in team %}
            <tr><td>{{ member.id }}</td><td>₹{{ member.commission }}</td></tr>
            {% endfor %}
        </table>
    {% else %}
        <div style="text-align: center; padding: 50px; color: #888;">
            <p>No data available</p>
        </div>
    {% endif %}

    <script>
        function copyRef() {
            var copyText = document.getElementById("refLink");
            copyText.select();
            document.execCommand("copy");
            alert("Referral Link Copied!");
        }
    </script>
</body>
</html>
