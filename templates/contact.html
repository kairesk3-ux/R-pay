<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Contact Us | R pay</title>
  <style>
    :root { font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%); color: #111827; }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #eef2ff; }
    .page { padding-bottom: 120px; }
    .topbar { display: flex; justify-content: space-between; align-items: center; padding: 1.25rem 1.25rem 0.75rem; }
    .brand-title { margin: 0; font-size: 1.7rem; font-weight: 800; }
    .card { background: #ffffff; border-radius: 28px; padding: 1.35rem; margin: 0 1.25rem 1rem; box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08); border: 1px solid rgba(148, 163, 184, 0.18); }
    .contact-item { display: flex; justify-content: space-between; align-items: center; gap: 1rem; padding: 1rem; margin-bottom: 0.85rem; border-radius: 20px; background: #f8fafc; border: 1px solid #e2e8f0; text-decoration: none; color: #0f172a; }
    .button-secondary { border: 1px solid #cbd5e1; background: #f8fafc; color: #0f172a; text-decoration: none; display: inline-flex; align-items: center; gap: 0.5rem; border-radius: 18px; padding: 0.8rem 1rem; margin: 1.25rem; }
    .bottom-nav { position: fixed; inset-inline-start: 0; right: 0; bottom: 0; left: 0; padding: 0.9rem 1rem 1.1rem; display: grid; grid-template-columns: repeat(5, minmax(0, 1fr)); gap: 0.5rem; background: rgba(255, 255, 255, 0.96); border-top: 1px solid rgba(148, 163, 184, 0.18); backdrop-filter: blur(16px); }
    .nav-item { display: grid; gap: 0.4rem; place-items: center; font-size: 0.78rem; color: #475569; text-decoration: none; }
    .nav-icon { width: 42px; height: 42px; border-radius: 14px; display: grid; place-items: center; background: #f8fafc; font-size: 1.05rem; color: #111827; }
    .nav-item.active .nav-icon { background: #111827; color: #ffffff; }
    @media (max-width: 420px) { .page { padding-bottom: 140px; } }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <h1 class="brand-title">Contact Us</h1>
      <a href="{{ url_for('me') }}" class="button-secondary">Back</a>
    </header>

    <div class="card">
      <h2>Get in touch</h2>
      <a class="contact-item" href="https://t.me/YourSupport" target="_blank">Telegram<span>Chat</span></a>
      <a class="contact-item" href="https://wa.me/1234567890" target="_blank">WhatsApp<span>Chat</span></a>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="{{ url_for('dashboard') }}" class="nav-item"><span class="nav-icon">🏠</span>Home</a>
    <a href="{{ url_for('deposit') }}" class="nav-item"><span class="nav-icon">💳</span>Deposit</a>
    <a href="{{ url_for('upi') }}" class="nav-item"><span class="nav-icon">🧾</span>UPI</a>
    <a href="{{ url_for('team') }}" class="nav-item"><span class="nav-icon">👥</span>Team</a>
    <a href="{{ url_for('me') }}" class="nav-item active"><span class="nav-icon">🙋</span>Me</a>
  </nav>
</body>
</html>
